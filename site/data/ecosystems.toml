# The ecosystem colour system: each package type in its own project's brand colour, never the peryx
# gradient. `live = true` marks the ecosystems peryx serves today; the rest are the roadmap the
# (role × ecosystem) model is built for. `chip = true` picks the sample tags the brand book renders
# in its "In product" component row. Both the brand page and the brand book render from this file.

