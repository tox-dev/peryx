<figure class="screen">
  <img class="screen-light" src="{{ get_url(path='screens/' ~ name ~ '-light.png') }}" alt="{{ alt }}" loading="lazy">
  <img class="screen-dark" src="{{ get_url(path='screens/' ~ name ~ '-dark.png') }}" alt="{{ alt }}" loading="lazy">
  <figcaption>{{ alt }}</figcaption>
</figure>
